name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            artifact: pit-linux-x86_64

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            artifact: pit-linux-aarch64

          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            artifact: pit-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            artifact: pit-macos-aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            artifact: pit-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/pit ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/pit.exe ${{ matrix.artifact }}

      - name: Rename library (Linux)
        if: runner.os == 'Linux'
        run: cp target/${{ matrix.target }}/release/libolive_std.so libolive_std-${{ matrix.target == 'x86_64-unknown-linux-musl' && 'linux-x86_64' || 'linux-aarch64' }}.so

      - name: Rename library (macOS)
        if: runner.os == 'macOS'
        run: cp target/${{ matrix.target }}/release/libolive_std.dylib libolive_std-${{ matrix.target == 'x86_64-apple-darwin' && 'macos-x86_64' || 'macos-aarch64' }}.dylib

      - name: Rename library (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/libolive_std.dll libolive_std-windows-x86_64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-bundle
          path: |
            ${{ matrix.artifact }}
            libolive_std-*.so
            libolive_std-*.dylib
            libolive_std-*.dll

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir dist
          find artifacts -type f -exec mv {} dist/ \;
          chmod +x dist/pit-linux-* dist/pit-macos-*
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
